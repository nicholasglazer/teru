name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            flags: ""
          - name: linux-x86_64-x11
            flags: "-Dwayland=false"
          - name: linux-x86_64-wayland
            flags: "-Dx11=false"
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.813+2153f8143
      - name: Install deps
        run: sudo apt-get install -y libxcb1-dev libxcb-shm0-dev libxkbcommon-dev libwayland-dev
      - name: Build
        run: zig build -Doptimize=ReleaseSafe ${{ matrix.flags }}
      - run: strip zig-out/bin/teru
      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/teru dist/
          cp LICENSE README.md CHANGELOG.md dist/
          tar czf teru-${{ matrix.name }}.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: teru-${{ matrix.name }}
          path: teru-${{ matrix.name }}.tar.gz

  # build-windows: DEFERRED for 0.10.0 — the Zig 0.17 std broke the Windows
  #   build at several POSIX sites (daemon poll, raw termios, png/log fds).
  #   Re-enable once the Windows port lands (tracked task). teru is Linux+macOS
  #   for this release; teruwm is Linux-only by design.

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-15
            name: macos-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.813+2153f8143
      - name: Build
        run: zig build -Doptimize=ReleaseSafe
      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/teru dist/
          cp LICENSE README.md CHANGELOG.md dist/
          tar czf teru-${{ matrix.name }}.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: teru-${{ matrix.name }}
          path: teru-${{ matrix.name }}.tar.gz

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            teru-linux-x86_64/teru-linux-x86_64.tar.gz
            teru-linux-x86_64-x11/teru-linux-x86_64-x11.tar.gz
            teru-linux-x86_64-wayland/teru-linux-x86_64-wayland.tar.gz
            teru-macos-aarch64/teru-macos-aarch64.tar.gz
          generate_release_notes: true
