name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            deps: libxcb1-dev libxcb-shm0-dev libxkbcommon-dev libwayland-dev
          - os: ubuntu-latest
            target: aarch64-linux
            deps: libxcb1-dev libxcb-shm0-dev libxkbcommon-dev libwayland-dev
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3039+b490412cd
      - name: Install deps
        run: sudo apt-get install -y ${{ matrix.deps }}
      - name: Build
        run: zig build -Doptimize=ReleaseSafe
      - name: Strip
        run: strip zig-out/bin/teru || true
      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/teru dist/
          cp LICENSE README.md CHANGELOG.md dist/
          tar czf teru-${{ matrix.target }}.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: teru-${{ matrix.target }}
          path: teru-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            teru-x86_64-linux/teru-x86_64-linux.tar.gz
            teru-aarch64-linux/teru-aarch64-linux.tar.gz
          generate_release_notes: true
