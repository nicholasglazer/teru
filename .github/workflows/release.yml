name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.3039+b490412cd
      - name: Install deps
        run: sudo apt-get install -y libxcb1-dev libxcb-shm0-dev libxkbcommon-dev libwayland-dev
      - name: Build
        run: zig build -Doptimize=ReleaseSafe
      - name: Strip
        run: strip zig-out/bin/teru
      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/teru dist/
          cp LICENSE README.md CHANGELOG.md dist/
          tar czf teru-x86_64-linux.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: teru-x86_64-linux
          path: teru-x86_64-linux.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: teru-x86_64-linux/teru-x86_64-linux.tar.gz
          generate_release_notes: true
